            { letter: "C", text: "Patient Y — SRSF2 and STAG2 are adverse co-mutations that worsen outcomes in MDS-SF3B1", correct: true },

            { name: "Co-mutations", val: "TET2 only", abn: false },

            { letter: "C", text: "Neither — ring sideroblasts require ≥10 granules forming a complete ring", correct: false },
            { letter: "D", text: "Only the cell with 4 clustered granules — clustering is more important than number", correct: false }
        ],
        correctIdx: 1,
        explanation: "A ring sideroblast is defined as an erythroblast with ≥5 iron granules in a perinuclear distribution encircling ≥1/3 of the nuclear circumference. The cell with 4 granules does not meet the threshold. The cell with 6 granules covering ~50% of the circumference meets both criteria.",

    {

        vignette: "A bone marrow biopsy from a patient with suspected <strong>MDS-SF3B1</strong> shows prominent erythroid hyperplasia. The haematopathologist recommends immunohistochemistry. The following markers are ordered: <strong>CD71, Glycophorin A, CD117, E-cadherin, and CD34</strong>.",

        correctIdx: 2,
        explanation: "CD34 IHC is critical to exclude increased blasts. In the context of erythroid-rich marrows (common in MDS-SF3B1), blast enumeration on aspirate smears can be challenging. CD34 staining on the biopsy provides an objective assessment to ensure blasts are not increased, which would reclassify the case.",
        pearl: "CD71 and Glycophorin A mark erythroid cells. CD117 and E-cadherin highlight left-shifted erythroid precursors. But CD34 is the clinically decisive stain — it answers: 'Are there too many blasts?' This single finding can change classification from MDS-SF3B1 to MDS with excess blasts."

// App State
let state = {
    screen: 'landing',
    currentTopic: null,
    currentQIdx: 0,
    questions: [],
    answers: [],
    score: 0,
    answered: false
};

function getQuestions(topic) {
    if (topic === 'all') return [...DILEMMAS].sort(() => Math.random() - 0.5);
    return DILEMMAS.filter(d => d.topic === topic).sort(() => Math.random() - 0.5);
}

function render() {
    const app = document.getElementById('app');
    if (state.screen === 'landing') renderLanding(app);
    else if (state.screen === 'quiz') renderQuiz(app);
    else if (state.screen === 'score') renderScore(app);
    else if (state.screen === 'review') renderReview(app);
}

function renderLanding(app) {
    const totalQ = DILEMMAS.length;
    const topicCounts = {};
    DILEMMAS.forEach(d => { topicCounts[d.topic] = (topicCounts[d.topic] || 0) + 1; });

    app.innerHTML = `
        <div class="landing">
            <div class="landing-icon">🧠</div>
            <h2>Test Your Clinical Decision-Making</h2>
            <p>Navigate real-world diagnostic and therapeutic dilemmas in MDS with mutated SF3B1. Each scenario presents a branching clinical decision based on ICC classification criteria.</p>

            <div class="stats-bar">
                <div class="stat-item"><div class="stat-num">${totalQ}</div><div class="stat-label">Dilemmas</div></div>
                <div class="stat-item"><div class="stat-num">${Object.keys(TOPICS).length}</div><div class="stat-label">Topics</div></div>
                <div class="stat-item"><div class="stat-num">🎯</div><div class="stat-label">Evidence-Based</div></div>
            </div>

            <h3 style="margin: 1.5rem 0 0.8rem; color: var(--secondary-blue); font-size: 1.1rem;">Choose a Topic or Challenge All</h3>

            <div class="topic-grid">
                ${Object.entries(TOPICS).map(([key, t]) => `
                    <div class="topic-card" onclick="startTopic('${key}')">
                        <div class="topic-icon">${t.icon}</div>
                        <h3>${t.name}</h3>
                        <p>${t.desc}</p>
                        <span class="q-count">${topicCounts[key] || 0} dilemma${(topicCounts[key] || 0) !== 1 ? 's' : ''}</span>
                    </div>
                `).join('')}
            </div>

            <div style="margin-top: 1.5rem;">
                <button class="btn-primary" onclick="startTopic('all')">
                    <span>🔥</span> Challenge All ${totalQ} Dilemmas
                </button>
            </div>
        </div>
    `;
}

function startTopic(topic) {
    state.currentTopic = topic;
    state.questions = getQuestions(topic);
    state.currentQIdx = 0;
    state.answers = [];
    state.score = 0;
    state.answered = false;
    state.screen = 'quiz';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuiz(app) {
    const q = state.questions[state.currentQIdx];
    const total = state.questions.length;
    const progress = ((state.currentQIdx) / total * 100).toFixed(0);
    const topicInfo = TOPICS[q.topic];

    app.innerHTML = `
        <div class="progress-bar-wrap"><div class="progress-fill" style="width:${progress}%"></div></div>
        <div class="progress-text">Question ${state.currentQIdx + 1} of ${total}</div>

        <div class="scenario-card" style="margin-top: 0.8rem;">
            <div class="scenario-header">
                <div>
                    <span class="scenario-tag">${topicInfo.icon} ${topicInfo.name}</span>
                </div>
                <div class="scenario-num">Dilemma #${state.currentQIdx + 1}</div>
            </div>
            <div class="scenario-body">
                <h3>${q.title}</h3>
                <div class="clinical-vignette">${q.vignette}</div>

                ${q.labs.length > 0 ? `
                    <div class="lab-values">
                        ${q.labs.map(l => `
                            <div class="lab-item">
                                <span class="lab-name">${l.name}</span>
                                <span class="lab-val ${l.abn ? 'abnormal' : ''}">${l.val}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}

                <div class="question-text">${q.question}</div>

                <div class="options-list">
                    ${q.options.map((opt, i) => `
                        <div class="option-btn ${state.answered ? (i === q.correctIdx ? 'correct' : (state.answers[state.currentQIdx] === i && i !== q.correctIdx ? 'incorrect' : '')) : ''} ${state.answered ? 'disabled' : ''}"
                             onclick="${state.answered ? '' : `selectAnswer(${i})`}"
                             id="opt-${i}">
                            <span class="opt-letter">${opt.letter}</span>
                            <span>${opt.text}</span>
                        </div>
                    `).join('')}
                </div>

                <div id="feedback-area"></div>

                ${state.answered ? `
                    <div class="nav-buttons">
                        <button class="btn-secondary" onclick="goHome()">← Home</button>
                        ${state.currentQIdx < total - 1 ?
                            `<button class="btn-primary" onclick="nextQuestion()">Next Dilemma →</button>` :
                            `<button class="btn-primary" onclick="showScore()">See Results 📊</button>`
                        }
                    </div>
                ` : ''}
            </div>
        </div>
    `;
}

function selectAnswer(idx) {
    if (state.answered) return;
    state.answered = true;
    state.answers[state.currentQIdx] = idx;
    const q = state.questions[state.currentQIdx];
    const isCorrect = idx === q.correctIdx;
    if (isCorrect) state.score++;

    // Re-render to show option states
    renderQuiz(document.getElementById('app'));

    // Now inject feedback
    const fb = document.getElementById('feedback-area');
    fb.innerHTML = `
        <div class="feedback-box ${isCorrect ? 'correct-fb' : 'incorrect-fb'}">
            <div class="fb-title ${isCorrect ? 'correct-t' : 'incorrect-t'}">
                ${isCorrect ? '✅ Correct!' : '❌ Incorrect'}
            </div>
            <div class="fb-text">${q.explanation}</div>
            <div class="pearl">
                <strong>💡 Clinical Pearl:</strong> ${q.pearl}
            </div>
        </div>
    `;
}

function nextQuestion() {
    state.currentQIdx++;
    state.answered = false;
    state.screen = 'quiz';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showScore() {
    state.screen = 'score';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderScore(app) {
    const total = state.questions.length;
    const pct = Math.round((state.score / total) * 100);
    let grade = '', gradeColor = '';
    if (pct >= 90) { grade = '🏆 Expert Haematologist!'; gradeColor = 'var(--success-green)'; }
    else if (pct >= 70) { grade = '⭐ Proficient Clinician'; gradeColor = 'var(--info-blue)'; }
    else if (pct >= 50) { grade = '📚 Keep Learning'; gradeColor = 'var(--warning-orange)'; }
    else { grade = '🔬 Review Fundamentals'; gradeColor = 'var(--primary-red)'; }

    const topicName = state.currentTopic === 'all' ? 'All Topics' : TOPICS[state.currentTopic]?.name || '';

    app.innerHTML = `
        <div class="score-screen">
            <h2 style="color: var(--secondary-blue); margin-bottom: 0.3rem;">Session Complete</h2>
            <p style="color: #888; font-size: 0.9rem;">${topicName}</p>

            <div class="score-circle" style="--pct: ${pct}">
                <div class="score-circle-inner">
                    <div class="pct">${pct}%</div>
                    <div class="pct-label">${state.score}/${total}</div>
                </div>
            </div>

            <div class="score-grade" style="color: ${gradeColor}">${grade}</div>
            <p class="score-detail">You answered ${state.score} out of ${total} clinical dilemmas correctly.</p>

            <div class="review-list">
                <h3 style="font-size: 1rem; color: var(--secondary-blue); margin-bottom: 0.8rem;">📋 Review Your Answers</h3>
                ${state.questions.map((q, i) => {
                    const correct = state.answers[i] === q.correctIdx;
                    return `
                        <div class="review-item" onclick="reviewQuestion(${i})">
                            <span class="review-icon">${correct ? '✅' : '❌'}</span>
                            <div class="ri-text">
                                <div>${q.title}</div>
                                <div class="ri-topic">${TOPICS[q.topic].icon} ${TOPICS[q.topic].name}</div>
                            </div>
                            <span style="color: #ccc; font-size: 1.2rem;">›</span>
                        </div>
                    `;
                }).join('')}
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap;">
                <button class="btn-secondary" onclick="goHome()">← Home</button>
                <button class="btn-primary" onclick="startTopic('${state.currentTopic}')">🔄 Retry</button>
            </div>
        </div>
    `;
}

function reviewQuestion(idx) {
    state.screen = 'review';
    state.currentQIdx = idx;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderReview(app) {
    const q = state.questions[state.currentQIdx];
    const userAnswer = state.answers[state.currentQIdx];
    const isCorrect = userAnswer === q.correctIdx;
    const topicInfo = TOPICS[q.topic];

    app.innerHTML = `
        <div style="margin-bottom: 1rem;">
            <button class="btn-sm" style="background: var(--light-gray); color: var(--secondary-blue);" onclick="showScore()">← Back to Results</button>
        </div>

        <div class="scenario-card">
            <div class="scenario-header">
                <span class="scenario-tag">${topicInfo.icon} ${topicInfo.name}</span>
                <span class="scenario-num">${isCorrect ? '✅ Correct' : '❌ Incorrect'}</span>
            </div>
            <div class="scenario-body">
                <h3>${q.title}</h3>
                <div class="clinical-vignette">${q.vignette}</div>

                ${q.labs.length > 0 ? `
                    <div class="lab-values">
                        ${q.labs.map(l => `
                            <div class="lab-item">
                                <span class="lab-name">${l.name}</span>
                                <span class="lab-val ${l.abn ? 'abnormal' : ''}">${l.val}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}

                <div class="question-text">${q.question}</div>

                <div class="options-list">
                    ${q.options.map((opt, i) => `
                        <div class="option-btn ${i === q.correctIdx ? 'correct' : (i === userAnswer && i !== q.correctIdx ? 'incorrect' : '')} disabled">
                            <span class="opt-letter">${opt.letter}</span>
                            <span>${opt.text} ${i === userAnswer && i !== q.correctIdx ? '(Your answer)' : ''} ${i === q.correctIdx ? '(Correct)' : ''}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="feedback-box ${isCorrect ? 'correct-fb' : 'incorrect-fb'}" style="margin-top: 1.2rem;">
                    <div class="fb-title ${isCorrect ? 'correct-t' : 'incorrect-t'}">
                        ${isCorrect ? '✅ You got this right!' : '❌ Review this concept'}
                    </div>
                    <div class="fb-text">${q.explanation}</div>
                    <div class="pearl">
                        <strong>💡 Clinical Pearl:</strong> ${q.pearl}
                    </div>
                </div>
            </div>
        </div>
    `;
}

function goHome() {
    state = { screen: 'landing', currentTopic: null, currentQIdx: 0, questions: [], answers: [], score: 0, answered: false };
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Initial render
render();
</script>
</body>
</html>
